# Canonical model catalog for provider detection, auto-routing, and Chairman
# selection. Update model IDs here; do not hardcode them in scripts or protocol
# files. `scripts/detect-providers.sh --check-config` validates the required
# Anthropic, OpenAI, and Google entries after an edit.
# "high" = members with model: opus in frontmatter (heavyweight analysis)
# "mid"  = members with model: sonnet in frontmatter (faster/practical)
# "low"  = optional economical tier advertised by provider detection

provider_models:
  anthropic:
    high: opus
    mid: sonnet
    low: haiku
  openai:
    high: gpt-5.4
    mid: gpt-5.4
  google:
    high: gemini-3-pro
    mid: gemini-3-pro
  ollama:
    high: null  # uses first available model from detect-providers.sh
    mid: null
  nvidia_nim:
    high: deepseek-ai/deepseek-v4-pro
    mid: deepseek-ai/deepseek-v4-flash
  cursor_cli:
    # Aggregator — cross-family defaults so a Cursor seat adds diversity.
    # Verify live IDs with `cursor-agent --list-models`.
    high: gpt-5.4-high
    mid: gemini-3-pro

# Chairman auto-selection uses each provider's `high` model above. This avoids
# a second set of model IDs drifting out of sync.

# Explicit override for the Chairman across all sessions.
# Leave null/commented to use the STEP 1.7 selection algorithm.
# Example:
#   chairman:
#     provider: google
#     model: <exact-model-id>
chairman: null
